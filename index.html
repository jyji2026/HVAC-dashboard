<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HVAC车间 · 月度看板</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0a0e27;
      --bg-secondary: #0f1535;
      --bg-card: #111832;
      --border-color: #1e2d4a;
      --text-primary: #e8ecf4;
      --text-secondary: #7a8599;
      --accent-blue: #3b82f6;
      --accent-cyan: #06b6d4;
      --accent-green: #10b981;
      --accent-yellow: #f59e0b;
      --accent-red: #ef4444;
      --accent-purple: #8b5cf6;
    }

    body {
      font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      width: 100vw;
      height: 100vh;
      padding: 12px;
    }

    .dashboard {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      position: relative;
      flex-shrink: 0;
      height: 64px;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent-cyan), var(--accent-blue), transparent);
    }
    .header-title h1 {
      font-size: clamp(20px, 2.2vw, 30px);
      font-weight: 600;
      background: linear-gradient(90deg, var(--accent-cyan), var(--accent-blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 3px;
    }
    .header-stats {
      display: flex;
      gap: clamp(20px, 2.5vw, 40px);
      align-items: center;
    }
    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
    }
    .stat-value {
      font-size: clamp(18px, 1.8vw, 26px);
      font-weight: 700;
    }
    .stat-value.blue {
      color: var(--accent-blue);
    }
    .stat-value.green {
      color: var(--accent-green);
    }
    .stat-value.red {
      color: var(--accent-red);
    }
    .stat-value.cyan {
      color: var(--accent-cyan);
    }
    .datetime {
      font-size: clamp(12px, 1vw, 15px);
      color: var(--text-secondary);
      min-width: 160px;
      text-align: right;
    }

    .row-main {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1.6fr 1fr;
      gap: 10px;
      min-height: 0;
    }
    .row-bottom {
      flex: 0.8;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      min-height: 0;
    }

    .panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel-header {
      padding: 6px 14px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    .panel-header::before {
      content: '';
      width: 3px;
      height: 14px;
      background: linear-gradient(180deg, var(--accent-cyan), var(--accent-blue));
      border-radius: 2px;
    }
    .panel-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .panel-body {
      flex: 1;
      padding: 8px;
      overflow: hidden;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }
    .chart-container {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .right-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    .month-scroll {
      flex: 1;
      overflow: hidden;
      position: relative;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.15);
      border: 1px solid rgba(30, 45, 74, 0.25);
      min-height: 0;
    }
    .month-track {
      display: flex;
      flex-direction: column;
      animation: scrollVertical 16s linear infinite;
      padding: 2px 0;
    }
    .month-track .month-item {
      flex-shrink: 0;
      padding: 4px 10px;
      font-size: 12px;
      color: #d1d9e8;
      border-bottom: 1px solid rgba(30, 45, 74, 0.12);
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }
    .month-track .month-item .m-label {
      min-width: 32px;
      font-weight: 500;
      color: #a0b3d9;
    }
    .month-track .month-item .m-value {
      min-width: 52px;
      text-align: right;
      font-weight: 600;
    }
    .month-track .month-item .m-status {
      min-width: 44px;
      text-align: center;
    }

    .mini-tag {
      display: inline-block;
      padding: 0 10px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 500;
    }
    .mini-tag.green {
      background: rgba(16, 185, 129, 0.2);
      color: var(--accent-green);
    }
    .mini-tag.red {
      background: rgba(239, 68, 68, 0.2);
      color: var(--accent-red);
    }

    .month-scroll:hover .month-track {
      animation-play-state: paused;
    }

    @keyframes scrollVertical {
      0% {
        transform: translateY(0);
      }
      100% {
        transform: translateY(-50%);
      }
    }

    .ai-static {
      flex: 0 0 auto;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 4px;
      border: 1px solid rgba(30, 45, 74, 0.25);
      padding: 4px 6px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      max-height: 100px;
      overflow-y: auto;
    }
    .ai-static::-webkit-scrollbar {
      width: 3px;
    }
    .ai-static::-webkit-scrollbar-track {
      background: rgba(30, 45, 74, 0.2);
    }
    .ai-static::-webkit-scrollbar-thumb {
      background: var(--accent-cyan);
      border-radius: 3px;
    }
    .ai-item {
      font-size: 12px;
      color: #d1d9e8;
      padding: 3px 8px;
      border-bottom: 1px solid rgba(30, 45, 74, 0.1);
      line-height: 1.4;
    }
    .ai-item strong {
      color: var(--accent-cyan);
      margin-right: 4px;
    }

    @media (max-width: 1024px) {
      .row-main {
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto;
      }
      .row-main .panel:last-child {
        grid-column: span 2;
      }
      .row-bottom {
        grid-template-columns: 1fr 1fr;
      }
      .row-bottom .panel:last-child {
        grid-column: span 2;
      }
    }
    @media (max-width: 768px) {
      .row-main,
      .row-bottom {
        grid-template-columns: 1fr;
      }
      .row-main .panel:last-child,
      .row-bottom .panel:last-child {
        grid-column: span 1;
      }
      .header {
        flex-wrap: wrap;
        height: auto;
        gap: 8px;
        padding: 10px 16px;
      }
      .header-stats {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="dashboard">
    <!-- Header -->
    <div class="header">
      <div class="header-title"><h1>HVAC车间 · 月度看板</h1></div>
      <div class="header-stats">
        <div class="stat-item"><span class="stat-label">📆 7月累计不良</span><span class="stat-value red" id="kpiBad">--</span></div>
        <div class="stat-item"><span class="stat-label">📦 7月累计产量</span><span class="stat-value blue" id="kpiOutput">--</span></div>
        <div class="stat-item"><span class="stat-label">📊 7月良品率</span><span class="stat-value green" id="kpiYield">--</span></div>
        <div class="stat-item"><span class="stat-label">🎯 目标</span><span class="stat-value cyan">98%</span></div>
      </div>
      <div class="datetime" id="datetime"></div>
    </div>

    <!-- Row 2 -->
    <div class="row-main">
      <div class="panel"><div class="panel-header"><span class="panel-title">📈 月度良品率趋势 (1–7月)</span></div><div class="panel-body"><div class="chart-container"><canvas id="trendChart"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">📊 各产品月度良品率对比</span></div><div class="panel-body"><div class="chart-container"><canvas id="productTrendChart"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">🏭 7月各产品良品率</span></div><div class="panel-body"><div class="chart-container"><canvas id="julyProductChart"></canvas></div></div></div>
    </div>

    <!-- Row 3 -->
    <div class="row-bottom">
      <div class="panel"><div class="panel-header"><span class="panel-title">🧩 7月不良 · 工序分布</span></div><div class="panel-body"><div class="chart-container"><canvas id="stationChart"></canvas></div></div></div>
      <div class="panel"><div class="panel-header"><span class="panel-title">⚠️ TOP失效模式 (7月)</span></div><div class="panel-body"><div class="chart-container"><canvas id="defectChart"></canvas></div></div></div>

      <div class="panel">
        <div class="panel-header"><span class="panel-title">📋 月度明细 & AI建议</span></div>
        <div class="panel-body" style="padding:4px 6px 6px 6px;">
          <div class="right-content">
            <div class="month-scroll">
              <div class="month-track" id="monthTrack"></div>
            </div>
            <div class="ai-static" id="aiStatic"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ================================================================
    // 1. 核心数据 (从Excel提取)
    // ================================================================

    // 各产品RTY数据 (1-7月)
    const rtyData = {
      'T客户': [0.9918340480804916, 0.9971683873720136, 0.9970267211615074, 0.9869827374801955, 0.9861061841001132, 0.9925697390293058, 0.9996],
      'W04': [0.9918073924665858, 0.9972699154056952, 0.9920581071989236, 0.9797129198473281, 0.9892838426279603, 0.9830180728326573, 0.9916],
      'D01': [0.9924764652704534, 0.9952, 0.9955557260920896, 0.9626511696794776, 0.9735577053045187, 0.988110771640233, 0.9863]
    };

    const prodNames = ['T客户', 'W04', 'D01'];
    const months = ['1月', '2月', '3月', '4月', '5月', '6月', '7月'];

    // 7月生产数
    const julyProd = {
      'T客户': 16987,
      'W04': 6676,
      'D01': 4960
    };

    // 7月工序不良明细 (从Excel 7月 sheet提取)
    const stationData = {
      '装配': { 'T客户': 0, 'W04': 0, 'D01': 31 },
      '气检': { 'T客户': 0, 'W04': 1, 'D01': 0 },
      '电检': { 'T客户': 163, 'W04': 37, 'D01': 35 },
      '拍照': { 'T客户': 0, 'W04': 15, 'D01': 1 },
      'GP12': { 'T客户': 13, 'W04': 3, 'D01': 1 }
    };

    const stationLabels = ['装配', '气检', '电检', '拍照', 'GP12'];

    // 按工序汇总不良数
    const stationValues = stationLabels.map(s => {
      let sum = 0;
      for (const p of prodNames) sum += stationData[s][p];
      return sum;
    });

    // 计算7月各产品不良数 (按工序累加)
    const julyBad = {};
    for (const p of prodNames) {
      let total = 0;
      for (const s of stationLabels) {
        total += stationData[s][p];
      }
      julyBad[p] = total;
    }

    // 计算7月各产品良品数
    const julyGood = {};
    let totalBad = 0;
    let totalProd = 0;
    for (const p of prodNames) {
      julyGood[p] = julyProd[p] - julyBad[p];
      totalBad += julyBad[p];
      totalProd += julyProd[p];
    }

    // 7月各产品实际良品率 (基于工序不良累加)
    const julyRTY = {};
    for (const p of prodNames) {
      julyRTY[p] = julyGood[p] / julyProd[p];
    }

    // ================================================================
    // 2. 月度平均良品率 (使用RTY数据)
    // ================================================================
    function avgRTY(monthIdx) {
      let sum = 0;
      for (const p of prodNames) sum += rtyData[p][monthIdx];
      return sum / prodNames.length;
    }
    const monthlyYield = months.map((_, idx) => avgRTY(idx));

    // ================================================================
    // 3. KPI
    // ================================================================
    const yield7 = 1 - totalBad / totalProd;
    document.getElementById('kpiBad').textContent = totalBad.toLocaleString();
    document.getElementById('kpiOutput').textContent = totalProd.toLocaleString();
    document.getElementById('kpiYield').textContent = (yield7 * 100).toFixed(2) + '%';

    // ================================================================
    // 4. 时间
    // ================================================================
    function updateDateTime() {
      const now = new Date();
      document.getElementById('datetime').textContent = now.toLocaleString('zh-CN', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
        hour12: false
      });
    }
    setInterval(updateDateTime, 1000);
    updateDateTime();

    // ================================================================
    // 5. Chart.js 渲染 (深色)
    // ================================================================
    Chart.defaults.color = '#c8d0dc';
    Chart.defaults.borderColor = '#1a2540';

    // 5.1 月度良品率趋势
    new Chart(document.getElementById('trendChart').getContext('2d'), {
      type: 'line',
      data: {
        labels: months,
        datasets: [{
          label: '综合良品率',
          data: monthlyYield.map(v => +(v * 100).toFixed(2)),
          borderColor: '#60a5fa',
          backgroundColor: 'rgba(96,165,250,0.08)',
          fill: true,
          tension: 0.25,
          pointBackgroundColor: '#60a5fa',
          pointBorderColor: '#0f1729',
          pointBorderWidth: 2,
          pointRadius: 4,
        }, {
          label: '目标 98%',
          data: months.map(() => 98),
          borderColor: '#f87171',
          borderDash: [6, 4],
          borderWidth: 2,
          pointRadius: 0,
          fill: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'top',
            labels: { usePointStyle: true, boxWidth: 8, padding: 12, font: { size: 10 } }
          }
        },
        scales: {
          y: {
            min: 95.5,
            max: 100,
            ticks: { callback: v => v + '%', color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' }
          },
          x: {
            ticks: { color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' }
          }
        }
      }
    });

    // 5.2 各产品月度良品率对比
    new Chart(document.getElementById('productTrendChart').getContext('2d'), {
      type: 'line',
      data: {
        labels: months,
        datasets: prodNames.map((p, idx) => ({
          label: p,
          data: rtyData[p].map(v => +(v * 100).toFixed(2)),
          borderColor: ['#f87171', '#60a5fa', '#4ade80'][idx % 3],
          backgroundColor: 'transparent',
          tension: 0.2,
          pointRadius: 3,
          borderWidth: 2,
        }))
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: {
            position: 'top',
            labels: { usePointStyle: true, boxWidth: 8, padding: 10, font: { size: 9 } }
          }
        },
        scales: {
          y: {
            min: 94,
            max: 100,
            ticks: { callback: v => v + '%', color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' }
          },
          x: {
            ticks: { color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' }
          }
        }
      }
    });

    // 5.3 7月各产品良品率 (基于工序不良累加)
    new Chart(document.getElementById('julyProductChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: prodNames,
        datasets: [{
          label: '良品率 (%)',
          data: prodNames.map(p => +(julyRTY[p] * 100).toFixed(2)),
          backgroundColor: ['#f8717166', '#60a5fa66', '#4ade8066'],
          borderColor: ['#f87171', '#60a5fa', '#4ade80'],
          borderWidth: 2,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: {
            min: 93,
            max: 100,
            ticks: { callback: v => v + '%', color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' }
          },
          x: {
            ticks: { color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' }
          }
        }
      }
    });

    // 5.4 工序分布 (饼图)
    new Chart(document.getElementById('stationChart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: stationLabels,
        datasets: [{
          data: stationValues,
          backgroundColor: ['#60a5fa', '#4ade80', '#fb923c', '#f87171', '#a78bfa'],
          borderWidth: 1,
          borderColor: '#0f1729'
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { boxWidth: 12, font: { size: 9 }, color: '#c8d0dc' } }
        }
      }
    });

    // 5.5 TOP失效模式 (按工序汇总，横向条形图)
    // 按不良数量从大到小排序
    const stationSorted = stationLabels
      .map((label, idx) => ({ label, value: stationValues[idx] }))
      .filter(d => d.value > 0)
      .sort((a, b) => b.value - a.value);

    new Chart(document.getElementById('defectChart').getContext('2d'), {
      type: 'bar',
      data: {
        labels: stationSorted.map(d => d.label),
        datasets: [{
          label: '不良数量',
          data: stationSorted.map(d => d.value),
          backgroundColor: ['#fb923c77', '#f8717177', '#facc1577', '#60a5fa77', '#a78bfa77'],
          borderColor: ['#fb923c', '#f87171', '#facc15', '#60a5fa', '#a78bfa'],
          borderWidth: 2,
          borderRadius: 4,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        indexAxis: 'y',
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(context) {
                return '不良数: ' + context.parsed.x + ' 件';
              }
            }
          }
        },
        scales: {
          x: {
            beginAtZero: true,
            ticks: { color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' }
          },
          y: {
            ticks: { color: '#7a8599', font: { size: 10 } },
            grid: { color: 'rgba(30,45,74,0.5)' }
          }
        }
      }
    });

    // ================================================================
    // 6. 右侧内容: 月度明细(滚动) + AI建议(静态)
    // ================================================================

    // 6.1 月度明细滚动
    const monthTrack = document.getElementById('monthTrack');

    function buildMonthItems() {
      return months.map((m, i) => {
        const y = monthlyYield[i] * 100;
        const status = y >= 98 ? '达标' : '未达标';
        const cls = y >= 98 ? 'green' : 'red';
        return `<div class="month-item">
          <span class="m-label">${m}</span>
          <span class="m-value">${y.toFixed(2)}%</span>
          <span class="m-status"><span class="mini-tag ${cls}">${status}</span></span>
        </div>`;
      });
    }
    const monthItems = buildMonthItems();
    monthTrack.innerHTML = [...monthItems, ...monthItems].join('');

    // 6.2 AI建议 (基于7月数据，按工序TOP)
    const aiStatic = document.getElementById('aiStatic');

    const suggestions = stationSorted.map(({ label, value }) => {
      let advice = '';
      if (label === '电检') advice = `不良${value}件，建议优化测试治具及参数校准`;
      else if (label === '装配') advice = `不良${value}件，建议加强定位工装及操作培训`;
      else if (label === '拍照') advice = `不良${value}件，建议增加视觉防错及光源校准`;
      else if (label === 'GP12') advice = `不良${value}件，建议加强外观检验标准及抽检频次`;
      else if (label === '气检') advice = `不良${value}件，需检漏参数复测及气密性验证`;
      else advice = `不良${value}件，建议排查并改进`;
      return { label, advice };
    });

    aiStatic.innerHTML = suggestions.map(s =>
      `<div class="ai-item"><strong>${s.label}</strong> ${s.advice}</div>`
    ).join('');
  </script>
</body>
</html>
